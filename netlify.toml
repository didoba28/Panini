[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION                  = "20"
  NEXT_TELEMETRY_DISABLED       = "1"
  NEXT_PUBLIC_SUPABASE_URL      = "https://placeholder.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "placeholder-build-only"
  NEXT_PUBLIC_AI_ENDPOINT       = "/.netlify/functions/ai"

# Pas de redirect SPA — chaque page a son propre index.html (trailingSlash: true)
# Netlify Pretty URLs gère automatiquement /album → /album/index.html
